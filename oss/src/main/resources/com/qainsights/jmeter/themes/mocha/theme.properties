Button.default.background = #89b4fa
Button.default.foreground = #11111b
Button.default.hoverBackground = #b4befe
Button.default.pressedBackground = #74c7ec
Button.default.focusedBorderColor = #b4befe
Button.default.focusColor = #b4befe
Button.toolbar.hoverBackground = #313244
Button.toolbar.pressedBackground = #45475a

