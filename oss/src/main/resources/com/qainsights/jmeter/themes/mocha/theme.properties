#
# Catppuccin Mocha — FlatLaf Theme Properties
# Soothing pastel dark theme for Apache JMeter
# https://github.com/catppuccin/catppuccin
#
# Color Reference (Catppuccin Mocha palette):
#   Base:         #1e1e2e  (main background)
#   Mantle:       #181825  (darker background, panels)
#   Crust:        #11111b  (darkest background, status bar)
#   Surface0:     #313244  (surface elements)
#   Surface1:     #45475a  (hover states)
#   Surface2:     #585b70  (active states)
#   Overlay0:     #6c7086  (disabled elements)
#   Overlay1:     #7f849c  (subtle elements)
#   Overlay2:     #9399b2  (secondary text)
#   Text:         #cdd6f4  (primary text)
#   Subtext1:     #bac2de  (secondary text)
#   Subtext0:     #a6adc8  (muted text)
#   Blue:         #89b4fa  (primary accent)
#   Lavender:     #b4befe  (secondary accent)
#   Mauve:        #cba6f7  (tertiary accent)
#   Red:          #f38ba8  (errors)
#   Peach:        #fab387  (warnings)
#   Yellow:       #f9e2af  (highlights)
#   Green:        #a6e3a1  (success)
#   Teal:         #94e2d5  (info)
#   Sky:          #89dceb  (links)

# ========== Global Colors ==========
@background = #1e1e2e
@foreground = #cdd6f4
@disabledBackground = #181825
@disabledForeground = #a6adc8
@accentColor = #89b4fa

# ========== Component Colors ==========
@componentBackground = #313244
@selectionBackground = #45475a
@selectionForeground = #cdd6f4
@selectionInactiveBackground = #313244
@selectionInactiveForeground = #cdd6f4

# ========== Focus ==========
@focusColor = #89b4fa
@focusWidth = 1
@focusInnerWidth = 0

# ========== Borders & Arcs ==========
@borderColor = #313244
@disabledBorderColor = #45475a
Component.arc = 6
Button.arc = 8
CheckBox.arc = 4
Component.borderWidth = 1
Component.focusWidth = 1

# ========== Buttons ==========
Button.background = #313244
Button.foreground = #cdd6f4
