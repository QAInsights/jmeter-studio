#
# Aura Dark — FlatLaf Theme Properties
# Deep purple/lavender dark theme for Apache JMeter
#
# Color Reference:
#   Background:   #1a1625  (deepest background)
#   Surface:      #231d35  (panels, cards)
#   Elevated:     #2d2545  (headers, hover)
#   Border:       #3d3555  (borders, separators)
#   Accent:       #7c3aed  (primary purple)
#   Accent Hover: #9333ea  (lighter purple)
#   Text:         #e8e0f0  (primary text)
#   Text Muted:   #9b8fb8  (secondary text)
#   Text Dim:     #6b6080  (disabled text)

# ========== Global Colors ==========
@background = #1a1625
@foreground = #e8e0f0
@disabledBackground = #1a1625
@disabledForeground = #6b6080
@accentColor = #7c3aed

# ========== Component Colors ==========
@componentBackground = #231d35
@selectionBackground = #7c3aed
@selectionForeground = #ffffff
@selectionInactiveBackground = #2d2545
@selectionInactiveForeground = #e8e0f0

# ========== Focus ==========
@focusColor = #9333ea
@focusWidth = 1
@focusInnerWidth = 0

# ========== Borders & Arcs ==========
@borderColor = #3d3555
@disabledBorderColor = #2d2545
Component.arc = 6
Button.arc = 8
CheckBox.arc = 4
Component.borderWidth = 1
Component.focusWidth = 1

# ========== Buttons ==========
Button.background = #2d2545
Button.foreground = #e8e0f0
Button.hoverBackground = #3d3555
Button.pressedBackground = #4d4565
Button.selectedBackground = #7c3aed
Button.selectedForeground = #ffffff
Button.default.background = #7c3aed
Button.default.foreground = #ffffff
Button.default.hoverBackground = #9333ea
Button.default.pressedBackground = #6d28d9
Button.default.focusedBorderColor = #9333ea
Button.default.focusColor = #9333ea
Button.toolbar.hoverBackground = #2d2545
Button.toolbar.pressedBackground = #3d3555

# ========== Text Fields ==========
TextField.background = #231d35
TextField.foreground = #e8e0f0
TextField.caretForeground = #e8e0f0
TextField.selectionBackground = #7c3aed
TextField.selectionForeground = #ffffff
TextField.placeholderForeground = #6b6080
TextField.inactiveBackground = #1a1625

# ========== Text Areas ==========
TextArea.background = #231d35
TextArea.foreground = #e8e0f0
TextArea.caretForeground = #e8e0f0
TextArea.selectionBackground = #7c3aed
TextArea.selectionForeground = #ffffff
TextArea.inactiveBackground = #1a1625

# ========== Text Pane ==========
TextPane.background = #231d35
TextPane.foreground = #e8e0f0
TextPane.caretForeground = #e8e0f0
TextPane.selectionBackground = #7c3aed
TextPane.selectionForeground = #ffffff
TextPane.inactiveBackground = #1a1625

# ========== Editor Pane ==========
EditorPane.background = #231d35
EditorPane.foreground = #e8e0f0
EditorPane.caretForeground = #e8e0f0
EditorPane.selectionBackground = #7c3aed
EditorPane.selectionForeground = #ffffff
