# ========== Combo Box ==========
ComboBox.background = #231d35
ComboBox.foreground = #e8e0f0
ComboBox.buttonBackground = #2d2545
ComboBox.buttonEditableBackground = #2d2545
ComboBox.selectionBackground = #7c3aed
ComboBox.selectionForeground = #ffffff
ComboBox.disabledBackground = #1a1625
ComboBox.disabledForeground = #6b6080

# ========== Spinner ==========
