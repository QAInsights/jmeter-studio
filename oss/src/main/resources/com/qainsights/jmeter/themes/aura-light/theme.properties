TabbedPane.tabHeight = 32

# ========== Table ==========
Table.background = #f8f6fc
Table.foreground = #1e1530
Table.selectionBackground = #eee8f5
Table.selectionForeground = #1e1530
Table.selectionInactiveBackground = #f0ecf5
Table.gridColor = #e0d8f0
Table.alternateRowColor = #f4f0fa
Table.showHorizontalLines = false
Table.showVerticalLines = false
TableHeader.background = #eee8f5
TableHeader.foreground = #6b6080
TableHeader.separatorColor = #d0c8e0
TableHeader.bottomSeparatorColor = #d0c8e0

# ========== Tree ==========
Tree.background = #f8f6fc
Tree.foreground = #1e1530
Tree.textBackground = #f8f6fc
Tree.textForeground = #1e1530
Tree.selectionBackground = #7c3aed
