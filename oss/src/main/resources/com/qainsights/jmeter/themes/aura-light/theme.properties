#
# Aura Light — FlatLaf Theme Properties
# Clean, modern light theme with purple accents for Apache JMeter
#
# Color Reference:
#   Background:   #f8f6fc (very light lavender)
#   Surface:      #ffffff (white - inputs, panels)
#   Elevated:     #eee8f5 (headers, sidebars)
#   Border:       #d0c8e0 (separators, borders)
#   Accent:       #7c3aed (primary purple)
#   Accent Hover: #6d28d9 (darker purple)
#   Text:         #1e1530 (dark text)
#   Text Muted:   #6b6080 (secondary text)
#   Text Dim:     #a098b5 (disabled text)

# ========== Global Colors ==========
@background = #f8f6fc
@foreground = #1e1530
@disabledBackground = #f0ecf5
@disabledForeground = #a098b5
@accentColor = #7c3aed

# ========== Component Colors ==========
@componentBackground = #ffffff
@selectionBackground = #7c3aed
@selectionForeground = #ffffff
@selectionInactiveBackground = #eee8f5
@selectionInactiveForeground = #1e1530

# ========== Focus ==========
@focusColor = #9333ea
@focusWidth = 1
@focusInnerWidth = 0

# ========== Borders & Arcs ==========
@borderColor = #d0c8e0
@disabledBorderColor = #e0d8f0
Component.arc = 6
Button.arc = 8
CheckBox.arc = 4
Component.borderWidth = 1
Component.focusWidth = 1

# ========== Buttons ==========
Button.background = #eee8f5
Button.foreground = #1e1530
Button.hoverBackground = #e0d8f0
Button.pressedBackground = #d0c8e0
Button.selectedBackground = #7c3aed
Button.selectedForeground = #ffffff
Button.default.background = #7c3aed
Button.default.foreground = #1e1530
Button.default.hoverBackground = #6d28d9
Button.default.pressedBackground = #5b21b6
Button.default.focusedBorderColor = #7c3aed
Button.default.focusColor = #9333ea
Button.toolbar.hoverBackground = #eee8f5
Button.toolbar.pressedBackground = #e0d8f0

# ========== Text Fields ==========
TextField.background = #ffffff
TextField.foreground = #1e1530
TextField.caretForeground = #1e1530
TextField.selectionBackground = #7c3aed
TextField.selectionForeground = #ffffff
TextField.placeholderForeground = #a098b5
TextField.inactiveBackground = #f0ecf5

# ========== Text Areas ==========
TextArea.background = #ffffff
TextArea.foreground = #1e1530
TextArea.caretForeground = #1e1530
TextArea.selectionBackground = #7c3aed
TextArea.selectionForeground = #ffffff
TextArea.inactiveBackground = #f0ecf5

# ========== Text Pane ==========
TextPane.background = #ffffff
TextPane.foreground = #1e1530
TextPane.caretForeground = #1e1530
TextPane.selectionBackground = #7c3aed
TextPane.selectionForeground = #ffffff
TextPane.inactiveBackground = #f0ecf5

# ========== Editor Pane ==========
EditorPane.background = #ffffff
EditorPane.foreground = #1e1530
EditorPane.selectionBackground = #7c3aed
EditorPane.selectionForeground = #ffffff

# ========== Combo Box ==========
ComboBox.background = #ffffff
ComboBox.foreground = #1e1530
ComboBox.buttonBackground = #eee8f5
ComboBox.buttonEditableBackground = #eee8f5
ComboBox.selectionBackground = #7c3aed
ComboBox.selectionForeground = #ffffff
ComboBox.disabledBackground = #f0ecf5
ComboBox.disabledForeground = #a098b5

# ========== Spinner ==========
Spinner.background = #ffffff
Spinner.foreground = #1e1530
Spinner.buttonBackground = #eee8f5

# ========== Panels & Content ==========
Panel.background = #f8f6fc
Panel.foreground = #1e1530

# ========== Scroll Pane ==========
ScrollPane.background = #f8f6fc

# ========== Viewport ==========
Viewport.background = #f8f6fc

# ========== Split Pane ==========
SplitPane.background = #f8f6fc
SplitPaneDivider.draggingColor = #7c3aed

# ========== Menus ==========
MenuBar.background = #f8f6fc
MenuBar.foreground = #1e1530
MenuBar.hoverBackground = #eee8f5
MenuBar.selectionBackground = #7c3aed
MenuBar.selectionForeground = #ffffff
MenuBar.borderColor = #d0c8e0
Menu.background = #ffffff
Menu.foreground = #1e1530
Menu.selectionBackground = #7c3aed
Menu.selectionForeground = #ffffff
MenuItem.background = #ffffff
MenuItem.foreground = #1e1530
MenuItem.selectionBackground = #7c3aed
MenuItem.selectionForeground = #ffffff
MenuItem.acceleratorForeground = #6b6080
MenuItem.acceleratorSelectionForeground = #ffffff
PopupMenu.background = #ffffff
PopupMenu.foreground = #1e1530
PopupMenu.borderColor = #d0c8e0

# ========== Toolbar ==========
ToolBar.background = #f8f6fc
ToolBar.foreground = #1e1530
ToolBar.borderHandleColor = #d0c8e0

# ========== Tabs ==========
TabbedPane.background = #f8f6fc
TabbedPane.foreground = #6b6080
TabbedPane.selectedBackground = #ffffff
TabbedPane.selectedForeground = #1e1530
TabbedPane.hoverColor = #eee8f5
TabbedPane.focusColor = #7c3aed
TabbedPane.underlineColor = #7c3aed
TabbedPane.inactiveUnderlineColor = #d0c8e0
TabbedPane.contentAreaColor = #d0c8e0
