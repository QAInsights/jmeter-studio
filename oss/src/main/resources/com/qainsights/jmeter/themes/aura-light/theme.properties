Tree.selectionArc = 6
Tree.wideSelection = true
Tree.rendererFillBackground = true

# ========== List ==========
List.background = #f8f6fc
List.foreground = #1e1530
List.selectionBackground = #7c3aed
List.selectionForeground = #ffffff
List.selectionInactiveBackground = #eee8f5

# ========== Scroll Bars ==========
ScrollBar.background = #f8f6fc
ScrollBar.track = #f8f6fc
ScrollBar.thumb = #d0c8e0
ScrollBar.hoverTrackColor = #eee8f5
ScrollBar.hoverThumbColor = #b8b0cc
ScrollBar.pressedThumbColor = #a098b5
ScrollBar.width = 10
ScrollBar.thumbArc = 999
ScrollBar.thumbInsets = 2,2,2,2
ScrollBar.trackArc = 999
