# ========== Check Box ==========
CheckBox.icon.background = #ffffff
CheckBox.icon.checkmarkColor = #ffffff
CheckBox.icon.selectedBackground = #7c3aed
CheckBox.icon.borderColor = #d0c8e0
CheckBox.icon.focusedBorderColor = #7c3aed
CheckBox.icon.selectedBorderColor = #7c3aed

# ========== Radio Button ==========
RadioButton.icon.background = #ffffff
RadioButton.icon.checkmarkColor = #ffffff
RadioButton.icon.selectedBackground = #7c3aed
RadioButton.icon.borderColor = #d0c8e0
RadioButton.icon.focusedBorderColor = #7c3aed

# ========== Progress Bar ==========
ProgressBar.background = #eee8f5
ProgressBar.foreground = #7c3aed
